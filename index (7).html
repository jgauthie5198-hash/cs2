<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPS Game - Counter-Strike Style</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #1a1a1a;
            overflow: hidden;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100vh;
        }

        #hud {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            font-family: 'Arial', sans-serif;
            color: #00ff00;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 2px solid #00ff00;
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        .crosshair-dot {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #00ff00;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 5px #00ff00;
        }

        #weaponInfo {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border: 2px solid #00ff00;
            border-radius: 5px;
            font-size: 14px;
            min-width: 200px;
        }

        #ammoCount {
            font-size: 24px;
            color: #00ff00;
            margin-bottom: 10px;
        }

        #weaponName {
            font-size: 16px;
            color: #00ff00;
            margin-bottom: 5px;
        }

        .stat-row {
            margin: 5px 0;
            font-size: 12px;
        }

        #stats {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border: 2px solid #00ff00;
            border-radius: 5px;
            font-size: 12px;
        }

        #damageIndicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 32px;
            color: red;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.1s;
        }

        .muzzle-flash {
            position: absolute;
            pointer-events: none;
        }

        #instructions {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border: 2px solid #00ff00;
            border-radius: 5px;
            font-size: 12px;
            max-width: 250px;
        }

        .instruction-item {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div id="hud">
        <div id="crosshair">
            <div class="crosshair-dot"></div>
        </div>

        <div id="stats">
            <div>FPS: <span id="fps">0</span></div>
            <div>Position: <span id="position">0, 0, 0</span></div>
            <div>Bullets: <span id="bulletCount">0</span></div>
        </div>

        <div id="weaponInfo">
            <div id="weaponName">AK-47</div>
            <div id="ammoCount">30 / 240</div>
            <div class="stat-row">Fire Rate: 10 rounds/s</div>
            <div class="stat-row">Damage: 25</div>
            <div class="stat-row">Accuracy: 92%</div>
            <div class="stat-row">Recoil: Medium</div>
        </div>

        <div id="instructions">
            <div class="instruction-item"><strong>Controls:</strong></div>
            <div class="instruction-item">W/A/S/D - Move</div>
            <div class="instruction-item">MOUSE - Look Around</div>
            <div class="instruction-item">LEFT CLICK - Shoot</div>
            <div class="instruction-item">SPACE - Jump</div>
            <div class="instruction-item">R - Reload</div>
            <div class="instruction-item">1-3 - Switch Weapons</div>
            <div class="instruction-item">SHIFT - Sprint</div>
            <div class="instruction-item">CTRL - Crouch</div>
        </div>

        <div id="damageIndicator">HIT!</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"></script>
    <script src="game.js"></script>
</body>
</html>
